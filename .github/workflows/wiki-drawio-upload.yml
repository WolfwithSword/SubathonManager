name: Update Wiki Drawio

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      release_tag:
        type: string
        required: false
        default: nightly

jobs:
  update:
    name: Update Wiki Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Check if wiki repository exists
        id: wiki-check
        run: |
          set -e
          WIKI_URL="https://github.com/${{ github.repository }}-docs.git"
          if git ls-remote "$WIKI_URL" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no wiki exists
        if: steps.wiki-check.outputs.exists == 'false'
        run: echo "Wiki does not exist — skipping update."
          
      - name: Checkout Wiki Repository
        if: steps.wiki-check.outputs.exists == 'true'
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}-docs
          token: ${{ secrets.DOCS_DISPATCH_TOKEN }}
          
      - name: Download draw.io file from Nextcloud
        if: steps.wiki-check.outputs.exists == 'true'
        run: |
          mkdir -p docs
          curl -L "${{ vars.NEXTCLOUD_DRAWIO_URL }}" \
            -o "wiki/docs/SubathonManager_Design.drawio"
          
      - name: Render drawio to svg
        uses: rlespinasse/drawio-export-action@v2
        with:
          path: "wiki/docs/SubathonManager_Design.drawio"
          format: svg
          output: ./
          all-pages: true
          transparent: false
          svg-theme: dark
          action-mode: all

      - name: Commit drawio file
        if: steps.wiki-check.outputs.exists == 'true'
        run: |
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          echo "===Listing docs files==="
          ls wiki/docs
          echo "========================"
          
          git add "wiki/docs/SubathonManager_Design.drawio"
          git add "wiki/docs/*.svg"

          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "Update Subathon_Manager.drawio for release ${{ inputs.release_tag || 'nightly' }}"
            git push
          fi

  
  trigger-docs-release:
    runs-on: ubuntu-latest
    needs: update
    if: ${{ inputs.release_tag || 'nightly' }} != 'nightly'
    steps:
      - name: Dispatch docs release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DOCS_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'WolfwithSword',
              repo:  'SubathonManager-docs',
              event_type: 'docs-release',
              client_payload: {
                version: ${{ inputs.release_tag }}
              }
            });
